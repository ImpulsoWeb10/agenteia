<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Anúncios Marketplace</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container{
    width:700px;
    background:#111827;
    padding:25px;
    border-radius:12px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:10px;
    font-weight:bold;
}

.gerar{background:#2563eb;color:white;}
.baixar{background:#059669;color:white;}
.limpar{background:#dc2626;color:white;}

#resultado{
    margin-top:20px;
    background:#020617;
    padding:15px;
    border-radius:8px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>Gerador IA — Shopee & Mercado Livre</h2>

<label>Nome do Produto</label>
<input id="nome">

<label>Descrição Curta</label>
<textarea id="descricao"></textarea>

<label>Peso / Volume</label>
<input id="peso">

<label>Marca</label>
<input id="marca">

<label>Categoria</label>
<input id="categoria">

<button class="gerar" onclick="gerar()">⚡ Gerar 5 Anúncios</button>
<button class="baixar" onclick="baixar()">⬇ Baixar TXT</button>
<button class="limpar" onclick="limpar()">🧹 Limpar</button>

<div id="resultado">Aguardando geração...</div>

</div>

<script>

async function gerar(){

const nome = document.getElementById("nome").value;
const descricao = document.getElementById("descricao").value;
const peso = document.getElementById("peso").value;
const marca = document.getElementById("marca").value;
const categoria = document.getElementById("categoria").value;

document.getElementById("resultado").innerText="Processando com IA...";

try{

const resposta = await fetch("http://localhost:3000/gerar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nome,
descricao,
peso,
marca,
categoria
})
});

const data = await resposta.json();

document.getElementById("resultado").innerText=data.resultado;

}catch(e){
alert("Erro ao conectar com a API. Verifique se o server.js está rodando.");
}

}

function baixar(){

const texto = document.getElementById("resultado").innerText;

const blob = new Blob([texto],{type:"text/plain"});
const link = document.createElement("a");

link.href = URL.createObjectURL(blob);
link.download = "anuncios.txt";
link.click();
}

function limpar(){

document.getElementById("nome").value="";
document.getElementById("descricao").value="";
document.getElementById("peso").value="";
document.getElementById("marca").value="";
document.getElementById("categoria").value="";
document.getElementById("resultado").innerText="Campos limpos.";

}

</script>

</body>
</html>
